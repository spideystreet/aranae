
name: 'synapse_dbt'
version: '1.0.0'
config-version: 2

profile: 'synapse_dbt'

model-paths: ["models"]
analysis-paths: ["analyses"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]
snapshot-paths: ["snapshots"]

target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  synapse_dbt:
    staging:
      +materialized: view
      +schema: staging
      free_work:
        +tags: ["freework"]
    marts:
      +materialized: table
      +schema: marts
