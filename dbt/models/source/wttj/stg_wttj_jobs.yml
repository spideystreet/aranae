
version: 2

models:
  - name: stg_wttj_jobs
    description: "Staging model for Welcome to the Jungle jobs. Performs data cleaning, date normalization, and contract mapping."
    columns:
      - name: job_id
        description: "Unique identifier for the job."
        tests:
          - unique
          - not_null
      - name: title
        description: "Job title."
        tests:
          - not_null
      - name: company
        description: "Hiring company."
      - name: publication_date
        description: "Normalized publication date (YYYY-MM-DD)."
        tests:
          - not_null
      - name: city
        description: "City extracted from source."
      - name: region
        description: "Region extracted from source."
      - name: raw_location
        description: "Original location string."
      - name: url
        description: "URL to the job offer."
        tests:
          - not_null
      - name: raw_income
        description: "Original income string from source."
      - name: salary
        description: "Extracted salary (annual)."
      - name: tjm
        description: "Extracted TJM (daily rate)."
      - name: remote
        description: "Normalized remote work type."
        tests:
          - accepted_values:
              values: ["Télétravail 100%", "Télétravail partiel", "Présentiel", "Pas d''infos"]
      - name: contracts
        description: "Normalized contract type."
      - name: source
        description: "Data source identifier."
        tests:
          - not_null
          - accepted_values:
              values: ["wttj"]
      - name: scraped_at
        description: "Timestamp when the job was scraped."
        tests:
          - not_null
