
version: 2

models:
  - name: raw_freework
    description: "Raw job listings from Free-Work"
    columns:
      - name: title
        description: "Job title"
        tests:
          - not_null
      - name: description
        description: "Job description"
      - name: url
        description: "Job URL"
      - name: company
        description: "Company name"
      - name: location
        description: "Job location"
      - name: date
        description: "Posting date"
