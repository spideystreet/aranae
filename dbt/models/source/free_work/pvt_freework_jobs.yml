
version: 2

models:
  - name: pvt_freework_jobs
    description: "Pivot (Mart) model for Free-Work jobs. Ready for analytics."
    columns:
      - name: job_id
        description: "Unique identifier for the job."
        tests:
          - unique
          - not_null
      - name: title
        description: "Job title."
      - name: company
        description: "Hiring company."
      - name: publication_date
        description: "Publication date."
      - name: city
        description: "City."
      - name: skills
        description: "List of skills required."
      - name: contracts
        description: "Contract types."
      - name: description
        description: "Full job description."
