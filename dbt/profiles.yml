config:
  send_anonymous_usage_stats: false

aranae:
  target: ci
  outputs:
    ci:
      type: clickhouse
      schema: default
      host: "{{ env_var('CLICKHOUSE_HOST') }}"
      port: "{{ env_var('CLICKHOUSE_PORT') | as_number }}"
      user: "{{ env_var('CLICKHOUSE_USER') }}"
      password: "{{ env_var('CLICKHOUSE_PASS') }}"
      database: "{{ env_var('CLICKHOUSE_DB') }}"