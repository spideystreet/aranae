name: CI

on:
  push:
    branches: ["main", "feat/**"]
  pull_request:
    branches: ["main"]

jobs:
  secret-scan:
    name: Secret scan (gitleaks)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  lint-python:
    name: Lint Python (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-ruff-0.15.2
      - run: pip install ruff==0.15.2
      - run: ruff check .
      - run: ruff format --check .

  test-python:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-pytest-9.0.2
      - run: pip install pytest==9.0.2 pydantic
      - run: pytest

  lint-sql:
    name: Lint SQL (sqlfluff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-sqlfluff-4.0.4
      - run: pip install sqlfluff==4.0.4
      - run: sqlfluff lint dbt/models --dialect postgres

  dbt-parse:
    name: dbt parse
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: pip-dbt-postgres-1.10.0
      - name: Install dbt
        run: pip install dbt-postgres==1.10.0
      - name: Write CI profiles
        run: |
          mkdir -p /tmp/dbt-ci
          cat > /tmp/dbt-ci/profiles.yml <<'EOF'
          aranae_dbt:
            target: ci
            outputs:
              ci:
                type: postgres
                host: localhost
                port: 5432
                user: ci
                password: ci
                dbname: ci
                schema: public
                threads: 1
          EOF
      - name: Parse dbt project
        run: dbt parse --project-dir dbt --profiles-dir /tmp/dbt-ci
        env:
          POSTGRES_DB: ci
          DBT_RAW_SCHEMA: source
